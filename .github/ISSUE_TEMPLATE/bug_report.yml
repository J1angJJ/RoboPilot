name: Bug report
description: Report a reproducible RoboPilot problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, paths, and sample files where possible.
      placeholder: |
        1. Run `robopilot ...`
        2. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: RoboPilot version
      placeholder: "1.1.0"
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.10"
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - Linux
        - macOS
        - Other
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I did not include API keys, tokens, private paths, or secrets.
          required: true
