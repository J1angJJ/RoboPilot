name: Documentation
description: Report unclear or outdated documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: input
    id: page
    attributes:
      label: Document or page
      placeholder: "README.md, docs/workflows.md, ..."
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What should be improved?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested wording or fix
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I did not include API keys, tokens, private paths, or secrets.
          required: true
