name: VSCode Extension

on:
  push:
  pull_request:

jobs:
  vscode-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: vscode-extension
        run: npm install
      - name: Compile extension
        working-directory: vscode-extension
        run: npm run compile
      - name: Run extension tests
        working-directory: vscode-extension
        run: npm test
